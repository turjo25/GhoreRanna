{% extends "base.html" %}

{% block title %}Login - Homemade Food Delivery{% endblock %}

{% block content %}
<div class="flex justify-center items-center min-h-[70vh]">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold text-center text-primary mb-6">Welcome Back</h2>

        <form method="POST" action="{% url 'login' %}" class="space-y-4">
            {% csrf_token %}

            {% for field in form %}
            <div>
                <label class="block text-gray-700 font-medium mb-1">{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}

            <button type="submit"
                class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-opacity-90 transition duration-300 mt-6">
                Login
            </button>

            <p class="text-center text-gray-600 mt-4">
                Don't have an account? <a href="{% url 'register' %}" class="text-primary hover:underline">Register
                    here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
