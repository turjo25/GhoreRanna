{% extends "base.html" %}
{% block title %}Delete Menu Item - Ghoreranna{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto py-20">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden p-10 text-center">
        <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
            </svg>
        </div>
        
        <h1 class="text-3xl font-bold text-gray-900 mb-3">Are you sure?</h1>
        <p class="text-gray-500 mb-10 text-lg">
            You are about to permanently delete <strong>"{{ menu.item_name }}"</strong>. This action cannot be undone.
        </p>
        
        <form method="post" class="flex flex-col sm:flex-row gap-4 justify-center">
            {% csrf_token %}
            <a href="{% url 'menu_list' %}" class="w-full sm:w-auto px-8 py-3 border border-gray-300 rounded-xl text-gray-700 font-medium hover:bg-gray-50 transition">
                Cancel
            </a>
            <button type="submit" class="w-full sm:w-auto bg-red-600 text-white px-8 py-3 rounded-xl font-medium hover:bg-red-700 transition shadow-md hover:shadow-lg">
                Yes, delete it
            </button>
        </form>
    </div>
</div>
{% endblock %}
