{% extends 'base.html' %}

{% block title %}Delete Cook - Ghoreranna{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto py-12 px-4">
    <div class="bg-white rounded-3xl shadow-sm border border-gray-100 p-10 text-center">
        <div class="mx-auto w-20 h-20 bg-red-50 rounded-full flex items-center justify-center mb-6 text-red-600">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        </div>
        
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight mb-4">Delete Cook?</h1>
        <p class="text-gray-500 mb-8 leading-relaxed">
            Are you sure you want to delete the cook profile for <strong class="text-gray-900 font-semibold">{{ cook.name }}</strong>?<br>
            <span class="text-red-500 font-medium">This action cannot be undone and will delete all associated menus.</span>
        </p>
        
        <form method="POST" class="flex flex-col sm:flex-row gap-4">
            {% csrf_token %}
            <button type="submit" class="w-full sm:w-2/3 bg-red-600 text-white font-bold py-3 px-6 rounded-2xl hover:bg-red-700 transition duration-200 shadow-lg shadow-red-500/20">
                Confirm Delete
            </button>
            <a href="{% url 'cook_list' %}" class="w-full sm:w-1/3 bg-gray-100 text-gray-700 font-bold py-3 px-6 rounded-2xl hover:bg-gray-200 transition duration-200">
                Cancel
            </button>
        </form>
    </div>
</div>
{% endblock %}
